<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎉 It’s My Birthday (ActionLord) 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<!-- PAYSTACK -->
<script src="https://js.paystack.co/v1/inline.js"></script>

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7915527570178075" crossorigin="anonymous"></script>

</head>

<body>

<div class="container">

<!-- TOP AD -->
<div class="ads">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-7915527570178075"
     data-ad-slot="7483129143"
     data-ad-format="auto"
     data-full-width-responsive="true">
</ins>

</div>
<div class="prof">
     <img src="images/my-picture.png" class="profile" onclick="openModal(this)">
     <img src="images/al.png" class="profile" onclick="openModal(this)">
     <img src="images/show.png" class="profile" onclick="openModal(this)">
     <img src="images/aww.png" class="profile" onclick="openModal(this)">
     <img src="images/me.png" class="profile" onclick="openModal(this)">
     <img src="images/file_000000008b607246829bb1d2e2f5a9a2_2.png" class="profile" onclick="openModal(this)">
</div>

<div id="imageModal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <img class="modal-content" id="fullImage">
</div>

<h1>🎉 It’s My Birthday 🎂</h1>

<p class="subtitle">
Drop a wish, send love or surprise me 🎁👇
</p>

<button onclick="shareWhatsApp()" class="primaryBtn">
📲 Wish Me on WhatsApp
</button>

<button onclick="toggleDark()">🌙 Toggle Dark Mode</button>

<button onclick="copyLink()">🔗 Copy Link</button>

<div id="countdown" class="countdown"></div>

<h3 id="wishCount">🔥 0 People have sent wishes</h3>

<form id="wishForm">

<input type="text" id="name" placeholder="Your name" required>
<textarea id="message" rows="4" placeholder="Write your wish..." required></textarea>

<button type="submit">Send Wish 🎉</button>

</form>

<!-- MIDDLE AD -->
<div class="ads">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-7915527570178075"
     data-ad-slot="7483129143"
     data-ad-format="auto"
     data-full-width-responsive="true">
</ins>

</div>

<h3 style="margin: 40% ; font-weight: bolder;">💬 Wishes</h3>
<div id="wishes"></div>

<!-- PAYMENT -->
<div class="payment">

<h3 class="send">🎁🎊 Send a Birthday Gift 🎉🎊</h3>
<p class="smallText"><marquee style="direction: right;">Your support means a lot 💖, either by sending gifts or by watching ads.</marquee></p>
</div>
<div class="quickAmounts">
<button onclick="setAmount(1000)">₦1,000</button>
<button onclick="setAmount(2000)">₦2,000</button>
<button onclick="setAmount(5000)">₦5,000</button>
<button onclick="setAmount(10000)">₦10,000</button>
</div>
<div class="quickAmounts">
<button onclick="setAmount(20000)">₦20,000</button>
<button onclick="setAmount(50000)">₦50,000</button>
<button onclick="setAmount(100000)">₦100,000</button>
<button onclick="setAmount(250000)">₦250,000</button>
</div>
<div class="quickAmounts">
     <button onclick="setAmount(500000)">₦500,000</button>
     <button onclick="setAmount(750000)">₦750,000</button>
     <button onclick="setAmount(1000000)">₦1000,000</button>
     <button onclick="setAmount(5000000)">₦5000,000</button>
</div>
<div class="wishing">
<input type="email" id="email" placeholder="Your email">
<input type="number" id="amount" placeholder="Amount (NGN)">
<div class="pay">
<button class="btn" type="button" onclick="payWithPaystack()">Send Gift 💰</button>Or<button class="btn" type="button" onclick="watchAds()">Watch Ads💰</button>
</div>
</div>

<!-- ADMIN -->
<div class="adminPanel">

<input type="password" id="adminPass" placeholder="Admin password">

<button onclick="enableAdmin()">Admin Login</button>
<button onclick="downloadGuestbook()">Download Wishes</button>

</div>

<!-- BOTTOM AD -->
<div class="ads">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-7915527570178075"
     data-ad-slot="7483129143"
     data-ad-format="auto"
     data-full-width-responsive="true">
</ins>
</div>



<script type="module" src="main.js"></script>

</body>
</html>
